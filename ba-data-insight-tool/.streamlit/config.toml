[client]
# Hide Streamlit's native "Deploy" button and the hamburger menu (Settings,
# Print, Record screencast, "Made with Streamlit", etc.) so the toolbar
# doesn't distract from the app's own branding in front of clients.
toolbarMode = "minimal"

[theme]
base = "dark"
primaryColor = "#5B8DEF"
backgroundColor = "#0A0E17"
secondaryBackgroundColor = "#0F1420"
textColor = "#EEF2F9"
font = "sans serif"
